# ==========================================================
# TourLens CI/CD — GitHub Actions
# Backend (FastAPI) + Frontend (RN CLI) lint & test
# ==========================================================

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ----------------------------------------------------------
  # Backend lint + test
  # ----------------------------------------------------------
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tourlens_user
          POSTGRES_PASSWORD: tourlens_pass
          POSTGRES_DB: tourlens_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Bağımlılıkları yükle
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app

      - name: Test (pytest)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://tourlens_user:tourlens_pass@localhost:5432/tourlens_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci_test_secret_key_must_be_at_least_64_characters_long_xxxxxxxxxxxxxx
          APP_ENV: testing
        run: pytest -v --maxfail=1

  # ----------------------------------------------------------
  # Frontend lint + tsc
  # ----------------------------------------------------------
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node 20 kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Bağımlılıkları yükle
        working-directory: frontend
        run: npm ci || npm install

      - name: TypeScript tip kontrolü
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present
