# ==========================================================
# TourLens — Nginx reverse proxy
# ==========================================================

worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 15M;   # upload limiti — backend'de 10MB, header için pay

    # Hız limitleri (master prompt § 7.2)
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    upstream tourlens_api { server api:8000; }
    upstream tourlens_minio { server minio:9000; }

    server {
        listen 80;
        server_name _;

        # API (genel)
        location /api/v1/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://tourlens_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # "Daha Fazla Bilgi" grounding'li uzun LLM üretimi varsayılan 60s'i
            # aşabilir → 504 olmaması için timeout'u istemci (120s) ile hizala.
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Auth — daha sıkı
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://tourlens_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Upload — orta sıkı
        location /api/v1/upload/ {
            limit_req zone=upload burst=15 nodelay;
            client_max_body_size 15M;
            proxy_pass http://tourlens_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Sağlık
        location /health { proxy_pass http://tourlens_api/health; }

        # Swagger / Redoc (üretimde kapatılabilir)
        location ~ ^/(docs|redoc) { proxy_pass http://tourlens_api; }

        # Görseller (MinIO public bucket)
        location /tourlens-images/ {
            proxy_pass http://tourlens_minio/tourlens-images/;
            proxy_set_header Host $host;
        }
    }
}
